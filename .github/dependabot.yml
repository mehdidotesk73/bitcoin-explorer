version: 2
updates:
  # npm dependencies (vite / echarts / capacitor / vite-plugin-pwa move fast).
  # The CI gate (build + tests) makes these safe to review and merge.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One weekly PR for routine minor/patch bumps.
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Skip ALL npm *major* bumps — they're the noisy, breakage-prone ones
      # (vite 8, vite-plugin-pwa 1.x, @vite-pwa/assets-generator 1.x all broke the
      # build; closed PRs #45/#49/#51). Majors are done deliberately as planned
      # upgrades; minor/patch still flow automatically (grouped above).
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  # Keep the GitHub Actions used by ci.yml / deploy.yml current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
