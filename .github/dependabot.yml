version: 2
updates:
  # npm dependencies (vite / echarts / capacitor / vite-plugin-pwa move fast).
  # The CI gate (build + tests) makes these safe to review and merge.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One PR for routine minor/patch bumps; majors stay separate for review.
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # PR #45: the 1.x major changed the generator's config API and broke the
      # build. It's dev-only PWA-icon tooling, so skip its major bumps and stay
      # on 0.2.x (patches still allowed) until we migrate pwa-assets.config.ts.
      - dependency-name: '@vite-pwa/assets-generator'
        update-types:
          - version-update:semver-major

  # Keep the GitHub Actions used by ci.yml / deploy.yml current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
