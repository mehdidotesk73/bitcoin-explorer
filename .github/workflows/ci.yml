name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-progress run if the same PR/branch is pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22 # matches deploy.yml
          cache: npm
      - run: npm ci
      - name: Format check (Prettier)
        run: npm run format:check
      - name: Unit tests
        run: npm run test:run
      - name: Type-check + build
        run: npm run build
