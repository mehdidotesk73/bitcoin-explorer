# Netlify build config — used for per-branch/PR preview URLs.
# Deploy Previews verified working from this branch.
#
# Production stays on GitHub Pages. Netlify only provides preview links:
# every pull request gets a "Deploy Preview" URL and every branch gets a
# branch URL, which you can open directly on a phone to test before merging.
#
# Note: BASE_PATH is intentionally NOT set here. GitHub Pages serves this app
# from /test-git-claude-project/, but Netlify serves it from the site root, so
# the Vite `base` must stay "/" (its default when BASE_PATH is unset).

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page app: send unknown paths to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
